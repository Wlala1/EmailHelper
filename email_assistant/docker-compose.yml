version: "3.9"

networks:
  ouma_net:
    driver: bridge

services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    networks:
      - ouma_net
    environment:
      NEO4J_AUTH: neo4j/ouma_neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - ouma_net
    env_file:
      - ./.env.docker
    environment:
      DATABASE_URL: postgresql+psycopg://ouma_user:ouma_password@ouma-db:5432/ouma_email
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ouma_neo4j_pass
      NEO4J_REQUIRED: "false"
      APP_ROLE: api
      ENABLE_BACKGROUND_WORKERS: "false"
      AUTO_CREATE_SCHEMA: "false"
    volumes:
      - attachments_data:/app/data/attachments
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    networks:
      - ouma_net
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678
      OUMA_API_URL: http://api:8000
      N8N_USER_FOLDER: /home/node/.n8n
      GENERIC_TIMEZONE: Asia/Singapore
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    ports:
      - "5678:5678"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 10s
      retries: 6

volumes:
  neo4j_data:
  neo4j_logs:
  n8n_data:
  attachments_data: